<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Page Not Found | Issah Boresa Backend</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center relative overflow-hidden font-sans selection:bg-cyan-500 selection:text-slate-950">

  <!-- Glow Background Accents -->
  <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[300px] bg-gradient-to-tr from-cyan-500/20 via-indigo-500/15 to-purple-600/10 blur-[130px] rounded-full pointer-events-none"></div>

  <div class="max-w-lg w-full px-6 py-12 bg-slate-900/80 border border-slate-800 rounded-3xl backdrop-blur-xl text-center relative z-10 shadow-2xl space-y-6">
    <div class="w-16 h-16 rounded-2xl bg-cyan-500/10 border border-cyan-500/30 flex items-center justify-center mx-auto text-cyan-400 font-mono text-2xl font-bold">
      404
    </div>

    <div>
      <h1 class="text-3xl font-extrabold text-white tracking-tight">Endpoint Not Found</h1>
      <p class="text-slate-400 text-sm mt-2">The API route or page you requested does not exist on this backend engine.</p>
    </div>

    <div class="pt-4 border-t border-slate-800/80 flex flex-col sm:flex-row items-center justify-center gap-3">
      <a href="/" class="w-full sm:w-auto px-5 py-2.5 rounded-xl text-xs font-semibold text-white bg-gradient-to-r from-cyan-500 to-indigo-600 shadow-lg shadow-cyan-500/20 hover:scale-105 transition-all">
        &larr; Back to Backend Home
      </a>
      <a href="/admin/" class="w-full sm:w-auto px-5 py-2.5 rounded-xl text-xs font-semibold text-slate-300 bg-slate-800 border border-slate-700 hover:text-white transition-all">
        Django Admin Panel
      </a>
    </div>
  </div>

</body>
</html>
